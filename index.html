<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tolika — Your Ultimate Toolbox</title>
    <meta name="description" content="85+ premium free client-side tools for developers, creators, and students. Image editing with 16x upscaling, text humanizer, developer utilities, math calculators, and file converters — running 100% locally and securely in your browser.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/tools.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
</head>
<body>
    <!-- Mobile sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="#" class="logo" id="logoLink">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" filter="url(#logoGlow)">
                        <defs>
                            <linearGradient id="prism1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#8B5CF6"/>
                                <stop offset="100%" stop-color="#22D3EE"/>
                            </linearGradient>
                            <linearGradient id="prism2" x1="100%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#F472B6"/>
                                <stop offset="100%" stop-color="#8B5CF6"/>
                            </linearGradient>
                            <linearGradient id="prism3" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#22D3EE"/>
                                <stop offset="100%" stop-color="#F472B6"/>
                            </linearGradient>
                            <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
                                <feGaussianBlur stdDeviation="1.5" result="blur" />
                                <feMerge>
                                    <feMergeNode in="blur" />
                                    <feMergeNode in="SourceGraphic" />
                                </feMerge>
                            </filter>
                        </defs>
                        <path d="M 4 6 L 16 6 L 16 12 L 8 12 Z" fill="url(#prism1)" />
                        <path d="M 16 6 L 28 6 L 24 12 L 16 12 Z" fill="url(#prism2)" opacity="0.9" />
                        <path d="M 11 12 L 16 12 L 16 28 L 13 28 Z" fill="url(#prism3)" />
                        <path d="M 16 12 L 21 12 L 19 28 L 16 28 Z" fill="url(#prism1)" opacity="0.8" />
                        <path d="M 16 6 L 20 12 L 16 16 L 12 12 Z" fill="url(#prism2)" opacity="0.85" />
                    </svg>
                </div>
                <span class="logo-text">Toli<span class="logo-accent">ka</span></span>
            </a>
            <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <!-- Intelligent Search -->
        <div class="search-container">
            <div class="search-box">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search 85+ tools…" autocomplete="off" spellcheck="false">
                <kbd class="search-kbd">/</kbd>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>

        <!-- Navigation (dynamically populated by app.js) -->
        <nav class="sidebar-nav" id="sidebarNav"></nav>

        <div class="sidebar-footer">
            <span class="tool-count" id="toolCount">85+ Tools</span>
            <span class="footer-dot">·</span>
            <span class="footer-tag">100% Client-Side</span>
        </div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main-content" id="mainContent">
        <header class="topbar" id="topbar">
            <button class="menu-btn" id="menuBtn" aria-label="Open sidebar">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="15" y2="12"/>
                    <line x1="3" y1="18" x2="18" y2="18"/>
                </svg>
            </button>
            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item breadcrumb-home">Home</span>
            </div>
            <div class="topbar-actions">
                <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
                    <svg class="theme-icon theme-icon-dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg class="theme-icon theme-icon-light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </div>
        </header>

        <!-- Tool Render Target -->
        <div class="tool-container" id="toolContainer">
            <!-- Landing page or active tool rendered here by app.js -->
        </div>
    </main>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
